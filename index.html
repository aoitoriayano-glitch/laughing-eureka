<!DOCTYPE html>
<html lang="ja">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🇺🇸 アメリカ歴史クイズ</title>

<style>

body {
  font-family: sans-serif;
  text-align: center;
  background: #eef5ff;
  padding: 20px;
}

.box {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 25px;
  border-radius: 20px;
  box-shadow: 0 0 10px #aaa;
}

h1 {
  color: #1d4ed8;
}

button {
  width: 90%;
  padding: 15px;
  margin: 10px;
  border: none;
  border-radius: 10px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1e40af;
}

#message {
  font-size: 20px;
}

.review {
  text-align: left;
  margin-top: 15px;
}

</style>

</head>


<body>

<div class="box">

<h1>🇺🇸 アメリカ歴史クイズ</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<h3 id="message"></h3>

<button onclick="nextQuestion()">
次の問題
</button>

<div id="result"></div>

</div>


<script>


const quiz = [

{
question:"アメリカ独立宣言が発表された年は？",
answers:[
"1492年",
"1776年",
"1861年",
"1945年"
],
correct:1,
explanation:"1776年7月4日に独立宣言が採択されました。"
},


{
question:"アメリカ初代大統領は誰？",
answers:[
"エイブラハム・リンカーン",
"トーマス・ジェファーソン",
"ジョージ・ワシントン",
"セオドア・ルーズベルト"
],
correct:2,
explanation:"ジョージ・ワシントンは1789年に初代大統領になりました。"
},


{
question:"南北戦争の主な原因は？",
answers:[
"宇宙開発",
"奴隷制度をめぐる対立",
"石油問題",
"移民問題"
],
correct:1,
explanation:"奴隷制度をめぐる対立が大きな原因でした。"
},


{
question:"自由の女神像はどこの国から贈られた？",
answers:[
"イギリス",
"フランス",
"スペイン",
"ドイツ"
],
correct:1,
explanation:"1886年にフランスからアメリカへ贈られました。"
},


{
question:"アメリカ国歌の元になった戦争は？",
answers:[
"独立戦争",
"南北戦争",
"米英戦争",
"第一次世界大戦"
],
correct:2,
explanation:"米英戦争中の出来事が国歌の元になりました。"
}

];


let current = 0;
let score = 0;
let results = [];
let rank = "";



function showQuestion(){

let q = quiz[current];


document.getElementById("question").innerText =
(current + 1) + "問目：" + q.question;


let html = "";


q.answers.forEach(function(answer,index){

html +=
`
<button onclick="checkAnswer(${index})">
${answer}
</button>
`;

});


document.getElementById("answers").innerHTML = html;

document.getElementById("message").innerText = "";

}



function checkAnswer(index){

let q = quiz[current];


if(index === q.correct){

score++;

results.push(
"⭕ 正解：" + q.question +
"<br>答え：" + q.answers[q.correct] +
"<br>解説：" + q.explanation
);

document.getElementById("message").innerText =
"⭕ 正解！";


}else{


results.push(
"❌ 不正解：" + q.question +
"<br>正解：" + q.answers[q.correct] +
"<br>解説：" + q.explanation
);


document.getElementById("message").innerText =
"❌ 不正解！";

}

}



function nextQuestion(){

current++;


if(current < quiz.length){

showQuestion();

}else{

finish();

}

}



function finish(){


if(score === 5){

rank = "🏆 アメリカ歴史博士";

}else if(score >= 3){

rank = "🥇 歴史マスター";

}else{

rank = "🌱 歴史初心者";

}



document.getElementById("question").innerText =
"🎉 クイズ終了！";


document.getElementById("answers").innerHTML = "";


document.getElementById("result").innerHTML =

`

<h2>総合得点：${score}/${quiz.length}</h2>

<h2>${rank}</h2>

<h3>📖 答え合わせ</h3>

<div class="review">

${results.map(function(x){
return "<p>" + x + "</p><hr>";
}).join("")}

</div>


<button onclick="shareLine()">
💬 LINEで結果を送る
</button>

`;

}



function shareLine(){


let text =

"🇺🇸 アメリカ歴史クイズ結果\n\n" +
"得点：" + score + "/" + quiz.length +
"\n称号：" + rank;


window.open(
"https://line.me/R/msg/text/?" +
encodeURIComponent(text)
);


}



showQuestion();


</script>


</body>

</html>
