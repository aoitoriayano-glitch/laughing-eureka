<!DOCTYPE html>
<html>
<head>
<title>クイズテスト</title>
</head>

<body>

<h1>🇺🇸 アメリカ歴史クイズ</h1>

<h2 id="question"></h2>

<button onclick="answer(0)">1492年</button>
<button onclick="answer(1)">1776年</button>
<button onclick="answer(2)">1861年</button>
<button onclick="answer(3)">1945年</button>

<p id="result"></p>


<script>

document.getElementById("question").innerText =
"アメリカ独立宣言が発表された年は？";


function answer(num){

if(num === 1){

document.getElementById("result").innerText =
"⭕ 正解！";

}else{

document.getElementById("result").innerText =
"❌ 不正解";

}

}

</script>

</body>
</html>
